# .github/workflows/selenium-tests.yml
#
# CI/CD Pipeline: Sanctuary Nature Foundation — Donate Form Selenium Tests
# Triggers: Push to main/develop, Pull Requests, and nightly scheduled runs
#

name: SNF Donate Form — Selenium Test Suite

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    # Nightly regression run at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override base URL for testing"
        required: false
        default: "https://sfdev.4review.info/magazine"
      headless:
        description: "Run in headless mode"
        required: false
        default: "true"

env:
  PYTHON_VERSION: "3.11"
  REPORTS_DIR: reports

jobs:
  # ------------------------------------------------------------------ #
  # Job 1: Lint & Static Analysis
  # ------------------------------------------------------------------ #
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting tools
        run: |
          pip install flake8 pylint

      - name: Run flake8 (PEP8 compliance)
        run: |
          flake8 pages/ tests/ conftest.py \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --statistics

  # ------------------------------------------------------------------ #
  # Job 2: Selenium Test Execution
  # ------------------------------------------------------------------ #
  selenium-tests:
    name: 🧪 Selenium Tests — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Create reports directory
        run: mkdir -p ${{ env.REPORTS_DIR }}

      - name: Run Smoke Tests
        run: |
          pytest tests/test_donate.py::TestPageLoadAndUI \
            --headless \
            --base-url="${{ github.event.inputs.base_url || 'https://sfdev.4review.info/magazine' }}" \
            --html=${{ env.REPORTS_DIR }}/smoke_report.html \
            --self-contained-html \
            -v \
            --tb=short
        continue-on-error: false

      - name: Run Full Regression Suite
        run: |
          pytest tests/ \
            --headless \
            --base-url="${{ github.event.inputs.base_url || 'https://sfdev.4review.info/magazine' }}" \
            --html=${{ env.REPORTS_DIR }}/regression_report_py${{ matrix.python-version }}.html \
            --self-contained-html \
            -v \
            --tb=long \
            -n auto \
            --junitxml=${{ env.REPORTS_DIR }}/junit_py${{ matrix.python-version }}.xml
        continue-on-error: true

      - name: Upload HTML Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ${{ env.REPORTS_DIR }}/
          retention-days: 30

      - name: Upload JUnit XML (for GitHub Test Summary)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-xml-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ${{ env.REPORTS_DIR }}/junit_*.xml

      - name: Publish Test Results to GitHub Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pytest Results — ${{ matrix.os }} / Python ${{ matrix.python-version }}
          path: ${{ env.REPORTS_DIR }}/junit_*.xml
          reporter: java-junit

  # ------------------------------------------------------------------ #
  # Job 3: Security Subset (runs on PRs to main only)
  # ------------------------------------------------------------------ #
  security-tests:
    name: 🔒 Security Test Subset
    runs-on: ubuntu-latest
    needs: selenium-tests
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Run Security Tests Only
        run: |
          pytest tests/ -k "xss or injection or security or https" \
            --headless \
            --html=reports/security_report.html \
            --self-contained-html \
            -v

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-report
          path: reports/security_report.html
          retention-days: 30

  # ------------------------------------------------------------------ #
  # Job 4: Notify on Failure
  # ------------------------------------------------------------------ #
  notify-failure:
    name: 📣 Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, selenium-tests]
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 *SNF Donate Form — Nightly Regression FAILED*\nRepository: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
